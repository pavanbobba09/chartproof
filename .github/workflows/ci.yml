name: CI and deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Lint
        run: ruff check backend data evals
      - name: Unit tests and deterministic checks
        run: pytest backend/tests -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Production build and type check
        run: npm run build

  smoke-eval:
    # Runs the live deterministic pipeline. No Groq key is required.
    needs: test
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Build retrieval index
        run: python -m backend.index.build --data data --out .chroma
      - name: Live smoke eval with thresholds
        run: python -m evals.run --suite smoke --live --enforce-thresholds
      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: evals/out/

  deploy:
    # Auto-sync to the Hugging Face Space only when main is green.
    # Requires repo secret HF_TOKEN with write access to the Space.
    needs: [test, frontend, smoke-eval]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "${HF_TOKEN}" ]; then
            echo "HF_TOKEN secret not set; skipping Space deploy."
            echo "Add HF_TOKEN in repo Settings -> Secrets, then re-run or push again."
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          # Space: trippy09/chartproof (adjust if your HF username differs)
          git push --force "https://trippy09:${HF_TOKEN}@huggingface.co/spaces/trippy09/chartproof" HEAD:main
